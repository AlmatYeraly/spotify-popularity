services:

  # ── existing services ──────────────────────────────────────

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/app
      - ./mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  trainer:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./mlflow:/app/mlflow
      - ./mlruns:/app/mlruns

  serving:
    build:
      context: .
      dockerfile: docker/Dockerfile.serve
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./mlflow:/app/mlflow
      - ./mlruns:/app/mlruns
      - ./data:/app/data

  # ── airflow infrastructure ─────────────────────────────────

  # Postgres stores all Airflow metadata: DAG runs, task states, logs
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # One-time init: creates DB tables and default admin user
  # Exits with code 0 when done — that's expected
  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version  # triggers init via env vars above, then exits
    volumes:
      - ./airflow/dags:/opt/airflow/dags

  # Scheduler watches DAG files, triggers runs, marks task states
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: "spotify_mlops_secret"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/app/data
      - ./src:/app/src
      - ./mlruns:/app/mlruns

  # Webserver is the UI at localhost:8080
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: "spotify_mlops_secret"
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── monitoring ─────────────────────────────────────────────

  evidently:
    build:
      context: .
      dockerfile: docker/Dockerfile.evidently
    volumes:
      - ./data:/app/data
    profiles:
      - monitoring

volumes:
  airflow-postgres-data: